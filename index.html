<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>まとめリーダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c28;
    --border: #242436; --accent: #e8640a; --text: #eeeef8; --muted: #77778a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100dvh; }

  /* ── ヘッダー ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 17px; font-weight: 900; color: var(--accent); }
  .header-right { display: flex; gap: 8px; }
  .btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-family: inherit; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; white-space: nowrap;
  }
  .btn:active { background: var(--border); }
  .btn.accent { border-color: var(--accent); color: var(--accent); }

  /* ── プルリフレッシュインジケーター ── */
  #pull-indicator {
    overflow: hidden; height: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; color: var(--muted);
    transition: height 0.1s; background: var(--bg);
  }

  /* ── タブ ── */
  .tabbar {
    position: sticky; top: 45px; z-index: 40;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 6px;
  }
  .tabbar::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 10px 13px; font-size: 13px; font-weight: 700;
    color: var(--muted); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-block; background: var(--accent); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px;
  }

  /* ── 記事リスト ── */
  main { padding: 6px 10px 80px; }
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 70px 0; gap: 14px;
    color: var(--muted); font-size: 13px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .article-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border-radius: 8px; padding: 10px 12px;
    margin-bottom: 3px; cursor: pointer;
  }
  .article-card:active { background: var(--surface2); }
  .article-card.read { opacity: 0.32; }
  .rank { font-size: 11px; font-weight: 900; color: var(--muted); min-width: 20px; flex-shrink: 0; text-align: center; }
  .rank.top3 { font-size: 14px; }
  .article-body { flex: 1; min-width: 0; }
  .article-title { font-size: 13px; font-weight: 700; line-height: 1.55; margin-bottom: 4px; word-break: break-all; }
  .article-meta { display: flex; gap: 8px; font-size: 11px; color: var(--muted); }
  .source-name { color: var(--accent); font-weight: 700; }
  .ext-btn {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; display: flex; align-items: center;
    justify-content: center; text-decoration: none; cursor: pointer;
  }
  .ext-btn:active { background: var(--border); }

  .status-bar {
    background: var(--surface); border-radius: 8px; padding: 7px 12px;
    margin-bottom: 6px; font-size: 11px; color: var(--muted);
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .status-ok { color: #4ecc96; }
  .status-ng { color: #ff5f7e; }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; line-height: 2.4; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 8px 14px; font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between;
  }

  /* ── リーダーモーダル ── */
  #reader-modal {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg); display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    overscroll-behavior: contain;
  }
  #reader-modal.open { transform: translateY(0); }

  #reader-header {
    flex-shrink: 0; background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px; display: flex; align-items: center; gap: 8px;
  }
  #reader-header .spacer { flex: 1; }
  .fs-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); width: 30px; height: 30px; border-radius: 6px;
    font-size: 13px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .fs-btn:active { background: var(--border); }

  #reader-body {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  /* ドラッグハンドル */
  #reader-handle {
    text-align: center; padding: 8px 0 4px; color: var(--border); font-size: 20px; line-height: 1;
    cursor: grab;
  }

  #reader-title {
    font-size: 15px; font-weight: 900; line-height: 1.6;
    padding: 12px 16px 0; color: var(--text);
    border-bottom: 2px solid var(--accent); margin-bottom: 0;
    padding-bottom: 12px;
  }

  #reader-content { padding: 0 0 80px; }

  /* 2ch スレ投稿スタイル */
  .post {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .post-num {
    color: var(--accent); font-size: 12px; font-weight: 900;
    margin-bottom: 5px;
  }
  .post-body {
    font-size: 14px; line-height: 1.85; color: var(--text);
    word-break: break-all; white-space: pre-wrap;
  }
  .post-body a { color: var(--accent); text-decoration: none; }

  /* Readability フォールバック */
  .prose { padding: 14px 16px 0; font-size: 14px; line-height: 1.9; color: #d0d0e8; }
  .prose p { margin-bottom: 12px; }
  .prose img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
  .prose a { color: var(--accent); }
  .prose blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 10px 0; }

  .reader-loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 0; gap: 14px;
    color: var(--muted); font-size: 13px;
  }
  .reader-error {
    text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; line-height: 2.6;
  }
</style>
</head>
<body>

<!-- リーダーモーダル -->
<div id="reader-modal">
  <div id="reader-header">
    <button class="btn" onclick="closeReader()">← 戻る</button>
    <div class="spacer"></div>
    <button class="fs-btn" onclick="changeFontSize(-1)">A-</button>
    <button class="fs-btn" onclick="changeFontSize(1)">A+</button>
    <a id="reader-ext" href="#" target="_blank" rel="noopener" class="btn accent">元記事 ↗</a>
  </div>
  <div id="reader-body">
    <div id="reader-handle">―</div>
    <div id="reader-title"></div>
    <div id="reader-content"></div>
  </div>
</div>

<!-- メイン -->
<header>
  <div class="logo">📡 まとめリーダー</div>
  <div class="header-right">
    <button class="btn" onclick="markAllRead()">既読</button>
    <button class="btn accent" onclick="loadAll()">↻ 更新</button>
  </div>
</header>
<div id="pull-indicator"></div>
<div class="tabbar">
  <button class="tab active" data-tab="all" onclick="switchTab(this)">すべて</button>
  <button class="tab" data-tab="0" onclick="switchTab(this)">ワロタ</button>
  <button class="tab" data-tab="1" onclick="switchTab(this)">にゅーもふ</button>
  <button class="tab" data-tab="2" onclick="switchTab(this)">アルファルファ</button>
  <button class="tab" data-tab="3" onclick="switchTab(this)">ハムスター</button>
  <button class="tab" data-tab="4" onclick="switchTab(this)">コピペ情報局</button>
</div>
<main id="main">
  <div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>
</main>
<footer>
  <span id="fcnt">記事 0件</span>
  <span id="ftime">--</span>
</footer>

<script>
/* ═══ 定数 ═══ */
const RSS2JSON = url =>
  `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;

const PAGE_PROXIES = [
  async url => {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (!d.contents || d.contents.length < 200) throw new Error();
    return d.contents;
  },
  async url => {
    const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(10000) });
    if (!r.ok) throw new Error();
    const t = await r.text();
    if (!t || t.startsWith('{') || t.length < 200) throw new Error();
    return t;
  },
];

const ANTENNAS = [
  { name: 'ワロタあんてな',        rss: 'https://matomeantena.com/index.rdf' },
  { name: 'にゅーもふ',            rss: 'https://newmofu.doorblog.jp/index.rdf' },
  { name: 'アルファルファモザイク', rss: 'https://alfalfalfa.com/index.rdf' },
  { name: 'ハムスター速報',         rss: 'https://hamusoku.com/index.rdf' },
  { name: 'コピペ情報局',           rss: 'https://news.2chblog.jp/index.rdf' },
];

/* ═══ 状態 ═══ */
let feedData   = ANTENNAS.map(() => []);
let feedStatus = ANTENNAS.map(() => null);
let currentTab = 'all';
let readIds    = new Set();
let articleMap = {};
let readerFontSize = parseInt(localStorage.getItem('fs') || '14');

try { readIds = new Set(JSON.parse(localStorage.getItem('r') || '[]')); } catch {}

/* ═══ ユーティリティ ═══ */
function cleanText(s) {
  return s.replace(/<[^>]+>/g, '')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ').trim();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function postText(el) {
  return el.innerHTML
    .replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n').replace(/<\/div>/gi, '\n')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\n{3,}/g, '\n\n').trim();
}
function relTime(date) {
  if (!date?.getTime()) return '';
  const m = Math.floor((Date.now() - date) / 60000);
  if (m < 1)    return 'たった今';
  if (m < 60)   return `${m}分前`;
  if (m < 1440) return `${Math.floor(m / 60)}時間前`;
  return `${Math.floor(m / 1440)}日前`;
}

/* ═══ スレ投稿抽出 ═══ */
function extractThreadPosts(html) {
  const div = document.createElement('div');
  div.innerHTML = html;

  // ノイズ除去
  div.querySelectorAll(
    'script,style,iframe,ins,aside,nav,header,footer,' +
    '.ad,.advertisement,.widget,.sidebar,.related,.sns,.share'
  ).forEach(el => el.remove());

  // 1. <blockquote> を優先（入れ子は除外）
  const bqs = [...div.querySelectorAll('blockquote')].filter(bq =>
    !bq.parentElement?.closest('blockquote') && bq.textContent.trim().length > 5
  );
  if (bqs.length >= 2) return bqs.map((el, i) => ({ num: i + 1, text: postText(el) }));

  // 2. よくある class パターン
  const patterns = [
    '[class*="post-body"]','[class*="res-body"]','[class*="message"]',
    '[class*="thread"]','[class*="bbs-post"]','[class*="quote"]',
  ];
  for (const sel of patterns) {
    const found = [...div.querySelectorAll(sel)].filter(el =>
      el.textContent.trim().length > 10
    );
    if (found.length >= 2) return found.map((el, i) => ({ num: i + 1, text: postText(el) }));
  }

  return null; // Readability フォールバック
}

function renderPosts(posts, title) {
  document.getElementById('reader-title').textContent = title;
  const fs = readerFontSize;
  document.getElementById('reader-content').innerHTML =
    posts.map(p => `
      <div class="post">
        <div class="post-num">${p.num}</div>
        <div class="post-body" style="font-size:${fs}px">${esc(p.text)}</div>
      </div>`).join('');
}

function renderReadability(html, title) {
  document.getElementById('reader-title').textContent = title;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('script,iframe,ins,aside').forEach(el => el.remove());
  tmp.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
  document.getElementById('reader-content').innerHTML =
    `<div class="prose" style="font-size:${readerFontSize}px">${tmp.innerHTML}</div>`;
}

function renderError(link) {
  document.getElementById('reader-content').innerHTML = `
    <div class="reader-error">
      記事の取得に失敗しました。<br>
      <a href="${esc(link)}" target="_blank" rel="noopener"
         class="btn accent" style="margin-top:16px">元記事を開く ↗</a>
    </div>`;
}

/* ═══ RSS 取得 ═══ */
async function fetchFeed(idx) {
  const { name, rss } = ANTENNAS[idx];
  try {
    const res = await fetch(RSS2JSON(rss), { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.status !== 'ok' || !data.items?.length) throw new Error();
    feedStatus[idx] = true;
    return data.items.slice(0, 25).map((item, i) => ({
      id:          (item.link || name + i).substring(0, 80),
      title:       cleanText(item.title || ''),
      link:        item.link || '#',
      date:        item.pubDate ? new Date(item.pubDate) : new Date(0),
      source:      name,
      idx,
      content:     item.content || '',
      description: item.description || '',
    }));
  } catch {
    feedStatus[idx] = false;
    return [];
  }
}

async function loadAll() {
  document.getElementById('main').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>';
  feedStatus = ANTENNAS.map(() => null);
  const results = await Promise.all(ANTENNAS.map((_, i) => fetchFeed(i)));
  results.forEach((d, i) => { feedData[i] = d; });
  document.getElementById('ftime').textContent =
    new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + ' 更新';
  updateBadges();
  render();
}

/* ═══ レンダリング ═══ */
function getArticles() {
  if (currentTab === 'all') {
    const seen = new Set();
    return feedData.flat()
      .sort((a, b) => b.date - a.date)
      .filter(a => {
        const k = a.title.substring(0, 20);
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });
  }
  return feedData[parseInt(currentTab)] || [];
}

function render() {
  const articles = getArticles();
  document.getElementById('fcnt').textContent = `記事 ${articles.length}件`;
  const main = document.getElementById('main');

  articleMap = {};
  articles.forEach(a => { articleMap[a.id] = a; });

  const statusHtml = ANTENNAS.map((a, i) => {
    const s = feedStatus[i];
    if (s === null) return '';
    return `<span class="${s ? 'status-ok' : 'status-ng'}">${s ? '✓' : '✗'} ${a.name}</span>`;
  }).join('');

  if (!articles.length) {
    main.innerHTML = `
      <div class="status-bar">${statusHtml}</div>
      <div class="empty">記事を取得できませんでした<br>通信環境を確認して更新してください</div>`;
    return;
  }

  const cardsHtml = articles.map((a, i) => {
    const isRead = readIds.has(a.id);
    const r      = i < 3 ? ['🥇','🥈','🥉'][i] : (i + 1);
    const rClass = i < 3 ? 'rank top3' : 'rank';
    const t      = relTime(a.date);
    const sid    = a.id.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<div class="article-card${isRead ? ' read' : ''}" onclick="openReader('${sid}')">
      <div class="${rClass}">${r}</div>
      <div class="article-body">
        <div class="article-title">${esc(a.title)}</div>
        <div class="article-meta">
          <span class="source-name">${esc(a.source)}</span>
          ${t ? `<span>${t}</span>` : ''}
        </div>
      </div>
      <a class="ext-btn" href="${esc(a.link)}" target="_blank" rel="noopener"
         onclick="event.stopPropagation(); markReadById('${sid}')" title="元記事">↗</a>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="status-bar">${statusHtml}</div>${cardsHtml}`;
}

/* ═══ リーダー ═══ */
async function openReader(id) {
  const a = articleMap[id];
  if (!a) return;

  markReadById(id);

  document.getElementById('reader-ext').href = a.link;
  document.getElementById('reader-title').textContent = a.title;
  document.getElementById('reader-content').innerHTML =
    '<div class="reader-loading"><div class="spinner"></div><span>スレを取得中...</span></div>';

  document.getElementById('reader-modal').classList.add('open');
  document.getElementById('reader-body').scrollTop = 0;
  history.pushState({ reader: true }, '');

  // ① RSS content フィールドで即時試行
  if (a.content && a.content.length > 300) {
    const posts = extractThreadPosts(a.content);
    if (posts && posts.length >= 2) { renderPosts(posts, a.title); return; }
  }

  // ② ページ取得（複数プロキシ順番試行）
  for (const proxy of PAGE_PROXIES) {
    try {
      const html = await proxy(a.link);

      // スレ投稿抽出を試みる
      const posts = extractThreadPosts(html);
      if (posts && posts.length >= 2) { renderPosts(posts, a.title); return; }

      // Readability フォールバック
      const parser  = new DOMParser();
      const doc     = parser.parseFromString(html, 'text/html');
      const base    = doc.createElement('base');
      base.href     = a.link;
      doc.head.prepend(base);
      const article = new Readability(doc).parse();
      if (article?.content) {
        const posts2 = extractThreadPosts(article.content);
        if (posts2 && posts2.length >= 2) {
          renderPosts(posts2, article.title || a.title);
        } else {
          renderReadability(article.content, article.title || a.title);
        }
        return;
      }
    } catch { /* 次のプロキシへ */ }
  }

  renderError(a.link);
}

function closeReader() {
  document.getElementById('reader-modal').classList.remove('open');
}

function changeFontSize(delta) {
  readerFontSize = Math.max(11, Math.min(20, readerFontSize + delta));
  localStorage.setItem('fs', readerFontSize);
  document.querySelectorAll('.post-body, .prose').forEach(el => {
    el.style.fontSize = readerFontSize + 'px';
  });
}

/* ═══ 既読管理 ═══ */
function markReadById(id) {
  if (readIds.has(id)) return;
  readIds.add(id);
  saveRead();
  document.querySelectorAll('.article-card').forEach(el => {
    if ((el.getAttribute('onclick') || '').includes(id.substring(0, 30).replace(/'/g, "\\'"))) {
      el.classList.add('read');
    }
  });
  updateBadges();
}

function markAllRead() {
  getArticles().forEach(a => readIds.add(a.id));
  saveRead();
  updateBadges();
  render();
}

function saveRead() {
  try {
    const arr = [...readIds].slice(-600);
    readIds = new Set(arr);
    localStorage.setItem('r', JSON.stringify(arr));
  } catch {}
}

function updateBadges() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.querySelector('.badge')?.remove();
    const idx  = tab.dataset.tab;
    const arts = idx === 'all' ? (() => {
      const seen = new Set();
      return feedData.flat().filter(a => {
        const k = a.title.substring(0, 20);
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });
    })() : (feedData[parseInt(idx)] || []);
    const unread = arts.filter(a => !readIds.has(a.id)).length;
    if (unread > 0) {
      const span = document.createElement('span');
      span.className = 'badge';
      span.textContent = unread > 99 ? '99+' : unread;
      tab.appendChild(span);
    }
  });
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.tab;
  render();
}

/* ═══ スワイプダウンでリーダーを閉じる ═══ */
{
  const body = document.getElementById('reader-body');
  let swipeY = 0;
  body.addEventListener('touchstart', e => { swipeY = e.touches[0].clientY; }, { passive: true });
  body.addEventListener('touchend', e => {
    const dist = e.changedTouches[0].clientY - swipeY;
    if (dist > 80 && body.scrollTop === 0) closeReader();
  }, { passive: true });
}

/* ═══ Android 戻るボタン ═══ */
window.addEventListener('popstate', () => {
  if (document.getElementById('reader-modal').classList.contains('open')) closeReader();
});

/* ═══ プルトゥリフレッシュ ═══ */
{
  const indicator = document.getElementById('pull-indicator');
  const THRESHOLD = 60;
  let startY = 0, dist = 0, pulling = false;

  document.addEventListener('touchstart', e => {
    if (document.getElementById('reader-modal').classList.contains('open')) return;
    startY = e.touches[0].clientY;
    pulling = document.scrollingElement.scrollTop === 0;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    dist = Math.max(0, e.touches[0].clientY - startY);
    if (dist > 10) {
      indicator.style.height = Math.min(dist * 0.6, 40) + 'px';
      indicator.textContent  = dist > THRESHOLD ? '↑ 放して更新' : '↓ 引いて更新';
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (dist > THRESHOLD) loadAll();
    indicator.style.height = '0';
    dist = 0; pulling = false;
  }, { passive: true });
}

/* ═══ 起動 ═══ */
loadAll();
setInterval(loadAll, 20 * 60 * 1000);
</script>
